<!DOCTYPE html>
<html>

<head>
	<title>Notepad</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
	<!-- 引入 Markdown 解析库和样式 -->
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.2.0/github-markdown.min.css">
	<!-- 样式 -->
	<style>
		body {
			max-width: 900px;
			margin: 0 auto;
			padding: 20px;
			font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
		}

		.markdown-box {
			display: none;
			padding: 0 0 150px;
		}

		.meun-list>div {
			line-height: 44px;
			color: #0969da;
			/* GitHub 风格蓝色 */
			text-decoration: none;
			/* 去掉默认下划线 */
			transition: all 0.2s ease;
			/* 过渡动画，hover 更顺滑 */
		}

		.fixed-btn {
			position: fixed;
			right: 20px;
			bottom: 50px;
			display: inline-block;
			width: 58px;
			height: 58px;
			line-height: 58px;
			border-radius: 58px;
			overflow: hidden;
			background: #f0f0f0;
			color: #333;
			text-decoration: none;
			border: 1px solid #ccc;
			cursor: pointer;
			transition: all 0.2s;
			text-align: center;
			box-sizing: border-box;
			user-select: none;
			display: none;
		}
	</style>
</head>

<body>
	<div class="meun-list">
		<div onclick="meunEvnet('./markdown/account.md')">《常用账号》</div>
		<div onclick="meunEvnet('./markdown/git.md')">《git常用命令》</div>
		<div onclick="meunEvnet('./markdown/array.md')">《数字的扩展》</div>
	</div>
	<div class="markdown-box">
		<div class="markdown-body" id="content"></div>
	</div>
	<div class="fixed-btn" onclick="hiddenMarkDown()">返回</div>
</body>
<script>

	const showMarkDown = () => {
		const meun = document.querySelector('.meun-list')
		const mkbox = document.querySelector('.markdown-box')
		const btn = document.querySelector('.fixed-btn')
		meun.style.display = 'none';
		mkbox.style.display = 'block';
		btn.style.display = 'block';
	}

	const hiddenMarkDown = () => {
		const meun = document.querySelector('.meun-list')
		const mkbox = document.querySelector('.markdown-box')
		const btn = document.querySelector('.fixed-btn')
		meun.style.display = 'block';
		mkbox.style.display = 'none';
		btn.style.display = 'none';

		const url = new URL(location.href);
		url.searchParams.delete('docName');
		history.replaceState(null, '', url);
	}

	const meunEvnet = (fileUrl) => {
		fetch(fileUrl + '?t=' + Date.now())
			.then(response => response.text())
			.then(text => {
				document.getElementById('content').innerHTML = marked.parse(text);
			});
		showMarkDown()

		const url = new URL(window.location.href);
		url.searchParams.set('docName', fileUrl);
		history.replaceState(null, '', url);
	}

	(() => {
		const url = new URL(location.href);
		// 根据参数名取值
		const docName = url.searchParams.get('docName');
		docName && meunEvnet(docName)
	})()

</script>

</html>
